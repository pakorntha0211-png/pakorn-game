<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Jump Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial,sans-serif;
    transition:0.5s;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
    background:linear-gradient(#87CEEB,#E0F6FF);
}

.night{
    background:linear-gradient(#10142b,#243860)!important;
}

#ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:120px;
    background:#4CAF50;
}

#player{
    width:50px;
    height:50px;
    background:#2196F3;
    border-radius:10px;
    position:absolute;
    bottom:120px;
    left:120px;
}

.obstacle{
    position:absolute;
    bottom:120px;
    width:40px;
    background:#f44336;
    border-radius:5px;
}

.coin{
    position:absolute;
    width:25px;
    height:25px;
    background:gold;
    border-radius:50%;
}

.star{
    position:absolute;
    width:30px;
    height:30px;
    background:cyan;
    clip-path:polygon(
    50% 0%,61% 35%,98% 35%,68% 57%,
    79% 91%,50% 70%,21% 91%,32% 57%,
    2% 35%,39% 35%);
}

#hud{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-size:24px;
    font-weight:bold;
    text-shadow:2px 2px 5px black;
}

#gameover{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

button{
    padding:10px 20px;
    margin-top:15px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="game">

<div id="hud">
Score: <span id="score">0</span><br>
High Score: <span id="high">0</span>
</div>

<div id="player"></div>
<div id="ground"></div>

<div id="gameover">
<h1>Game Over</h1>
<p id="finalScore"></p>
<button onclick="location.reload()">Restart</button>
</div>

</div>

<script>

const game = document.getElementById("game");
const player = document.getElementById("player");
const scoreText = document.getElementById("score");
const highText = document.getElementById("high");

let score=0;
let speed=6;

let y=0;
let velocity=0;
let gravity=0.8;

let invincible=false;
let gameOver=false;

let highScore=
Number(localStorage.getItem("highscore"))||0;

highText.textContent=highScore;

function jump(){
    if(y===0){
        velocity=-15;
    }
}

document.addEventListener("keydown",(e)=>{
    if(e.code==="Space"||e.code==="ArrowUp")
        jump();
});

document.addEventListener("touchstart",jump);
document.addEventListener("click",jump);

function physics(){

    velocity+=gravity;
    y+=velocity;

    if(y>0){
        y=0;
        velocity=0;
    }

    player.style.bottom=(120-y)+"px";

    requestAnimationFrame(physics);
}

physics();

function spawnObstacle(){

    const obs=document.createElement("div");
    obs.className="obstacle";

    let h=40+Math.random()*60;

    obs.style.height=h+"px";
    obs.style.left=window.innerWidth+"px";

    game.appendChild(obs);

    let x=window.innerWidth;

    const move=setInterval(()=>{

        if(gameOver){
            clearInterval(move);
            return;
        }

        x-=speed;
        obs.style.left=x+"px";

        const p=player.getBoundingClientRect();
        const o=obs.getBoundingClientRect();

        if(
        !invincible &&
        p.left<o.right &&
        p.right>o.left &&
        p.top<o.bottom &&
        p.bottom>o.top
        ){
            endGame();
        }

        if(x<-100){
            obs.remove();
            clearInterval(move);

            score++;
            speed+=0.03;

            scoreText.textContent=score;

            if(score>highScore){
                highScore=score;
                localStorage.setItem("highscore",highScore);
                highText.textContent=highScore;
            }
        }

    },16);
}

setInterval(()=>{
    if(!gameOver)
    spawnObstacle();
},1800);

function spawnCoin(){

    const coin=document.createElement("div");
    coin.className="coin";

    let x=window.innerWidth;
    let yy=180+Math.random()*180;

    coin.style.left=x+"px";
    coin.style.bottom=yy+"px";

    game.appendChild(coin);

    const move=setInterval(()=>{

        if(gameOver){
            clearInterval(move);
            return;
        }

        x-=speed;
        coin.style.left=x+"px";

        const p=player.getBoundingClientRect();
        const c=coin.getBoundingClientRect();

        if(
        p.left<c.right &&
        p.right>c.left &&
        p.top<c.bottom &&
        p.bottom>c.top
        ){
            score+=10;
            scoreText.textContent=score;
            coin.remove();
            clearInterval(move);
        }

        if(x<-50){
            coin.remove();
            clearInterval(move);
        }

    },16);

}

setInterval(()=>{
    if(!gameOver)
    spawnCoin();
},2500);

function spawnStar(){

    const star=document.createElement("div");
    star.className="star";

    let x=window.innerWidth;
    let yy=250;

    star.style.left=x+"px";
    star.style.bottom=yy+"px";

    game.appendChild(star);

    const move=setInterval(()=>{

        if(gameOver){
            clearInterval(move);
            return;
        }

        x-=speed;
        star.style.left=x+"px";

        const p=player.getBoundingClientRect();
        const s=star.getBoundingClientRect();

        if(
        p.left<s.right &&
        p.right>s.left &&
        p.top<s.bottom &&
        p.bottom>s.top
        ){

            invincible=true;
            player.style.background="yellow";

            setTimeout(()=>{
                invincible=false;
                player.style.background="#2196F3";
            },5000);

            star.remove();
            clearInterval(move);
        }

        if(x<-50){
            star.remove();
            clearInterval(move);
        }

    },16);

}

setInterval(()=>{
    if(!gameOver)
    spawnStar();
},12000);

setInterval(()=>{
    game.classList.toggle("night");
},15000);

function endGame(){

    gameOver=true;

    document.getElementById("gameover")
    .style.display="block";

    document.getElementById("finalScore")
    .innerHTML=
    "คะแนนของคุณ: "+score;
}

</script>
</body>
</html>
